<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MV Orchestrator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Instrument Sans"', 'system-ui', 'sans-serif'],
            mono: ['"Instrument Mono"', 'monospace'],
          },
        }
      }
    }
  </script>

  <style>
    [x-cloak] { display: none !important; }

    *, *::before, *::after {
      font-family: 'Instrument Sans', system-ui, sans-serif;
    }
    code, pre, .font-mono, input[class*="font-mono"], textarea[class*="font-mono"] {
      font-family: 'Instrument Mono', monospace;
    }

    /* ── Animations ────────────────────────────────────────────── */
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.45; transform: scale(0.85); }
    }
    .dot-pulse { animation: dot-pulse 2s ease-in-out infinite; }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-enter { animation: card-in 0.28s cubic-bezier(0.16, 1, 0.3, 1) both; }

    @keyframes modal-rise {
      from { opacity: 0; transform: translateY(14px) scale(0.975); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .modal-enter { animation: modal-rise 0.26s cubic-bezier(0.16, 1, 0.3, 1) both; }

    @keyframes spin-smooth { to { transform: rotate(360deg); } }
    .spin { animation: spin-smooth 0.75s linear infinite; }

    /* ── Accent line at page top ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(99,102,241,0.0) 10%,
        rgba(99,102,241,0.55) 40%,
        rgba(139,92,246,0.4) 60%,
        rgba(99,102,241,0.0) 90%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Scrollbar ─────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(15,15,30,0.10); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(15,15,30,0.18); }

    /* ── Details/summary reset ─────────────────────────────────── */
    details > summary             { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }

    /* ── Autofill override ─────────────────────────────────────── */
    input:-webkit-autofill,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 100px #ffffff inset;
      -webkit-text-fill-color: #1a1a28;
    }

    /* ── Card left accent bar ─────────────────────────────────── */
    .card-accent::before {
      content: '';
      position: absolute;
      left: 0;
      top: 12px;
      bottom: 12px;
      width: 2px;
      border-radius: 0 2px 2px 0;
      background: rgba(99,102,241,0);
      transition: background 0.25s ease;
    }
    .card-accent:hover::before {
      background: rgba(99,102,241,0.28);
    }
  </style>
</head>

<body x-data="app()" x-init="init()" class="bg-[#fafafd] text-[#1a1a28] min-h-screen antialiased font-sans">

<div class="max-w-[880px] mx-auto px-6 py-12">

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header class="flex items-center justify-between mb-10">
    <div class="flex items-center gap-3.5">
      <div class="relative w-8 h-8 shrink-0">
        <div class="absolute inset-0 rounded-[10px] bg-indigo-500/10 border border-indigo-500/20"></div>
        <svg class="absolute inset-0 m-auto w-4 h-4 text-indigo-400"
             fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375
                   m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375
                   m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375
                   m16.5 5.625c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
        </svg>
      </div>
      <div>
        <h1 class="text-[15px] font-semibold text-[#0d0d18] tracking-[-0.015em] leading-none">
          Materialized Views
        </h1>
        <p class="text-[11px] text-[#9090a8] mt-[5px] leading-none tracking-[0.04em] uppercase font-mono">
          Trino · Iceberg · Incremental
        </p>
      </div>
    </div>

    <button @click="showForm = true; editingView = null; resetForm()"
            class="flex items-center gap-2 px-4 py-[9px] rounded-[10px] text-[13px] font-semibold
                   bg-indigo-600 hover:bg-indigo-500 text-white
                   shadow-[0_0_0_1px_rgba(99,102,241,0.5),0_4px_16px_rgba(99,102,241,0.22)]
                   hover:shadow-[0_0_0_1px_rgba(99,102,241,0.7),0_4px_20px_rgba(99,102,241,0.35)]
                   transition-all duration-150 active:scale-[0.97]">
      <svg class="w-[13px] h-[13px]" fill="none" viewBox="0 0 24 24" stroke-width="2.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
      New View
    </button>
  </header>

  <!-- ── Meta row ────────────────────────────────────────────── -->
  <div x-show="views.length > 0"
       class="flex items-center gap-2 mb-4 pl-0.5">
    <span class="text-[11px] font-mono text-[#9090a8] tabular-nums"
          x-text="views.length + (views.length === 1 ? ' view' : ' views')"></span>
    <span class="text-[11px] text-[#c8c8d8]">·</span>
    <span class="text-[11px] font-mono text-[#9090a8]">polling every 5s</span>
  </div>

  <!-- ── Views list ───────────────────────────────────────────── -->
  <div class="space-y-2">
    <template x-for="(view, idx) in views" :key="view.name">
      <div class="card-accent relative bg-white border border-[rgba(15,15,30,0.08)]
                  rounded-xl card-enter overflow-hidden
                  hover:border-[rgba(15,15,30,0.14)]
                  transition-[border-color,box-shadow] duration-200
                  hover:shadow-[0_8px_28px_rgba(15,15,30,0.10)]"
           :style="`animation-delay:${idx * 45}ms`">

        <div class="px-5 py-[18px]">

          <!-- Row 1: name + badges + actions -->
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">

              <!-- Name + status badges -->
              <div class="flex items-center gap-2.5 flex-wrap">
                <h2 class="text-[14px] font-semibold font-mono text-[#0d0d18] tracking-[-0.01em]"
                    x-text="view.name"></h2>

                <!-- pending (no status yet or explicitly pending) -->
                <span x-show="!view.status || view.status.last_action === 'pending'"
                      class="inline-flex items-center gap-[5px] text-[10px] tracking-[0.06em]
                             uppercase font-mono px-[7px] py-[2px] rounded-full
                             bg-[#f0f0f6] text-[#888ca0] border border-[rgba(15,15,30,0.06)]">
                  <span class="w-[5px] h-[5px] rounded-full bg-[#c0c0d0] shrink-0"></span>
                  pending
                </span>

                <!-- idle / skip -->
                <span x-show="view.status?.last_action === 'skip'"
                      class="inline-flex items-center gap-[5px] text-[10px] tracking-[0.06em]
                             uppercase font-mono px-[7px] py-[2px] rounded-full
                             bg-[#f0f0f6] text-[#666684] border border-[rgba(15,15,30,0.06)]">
                  <span class="w-[5px] h-[5px] rounded-full bg-[#a8a8c0] shrink-0"></span>
                  idle
                </span>

                <!-- incremental -->
                <span x-show="view.status?.last_action === 'incremental'"
                      class="inline-flex items-center gap-[5px] text-[10px] tracking-[0.06em]
                             uppercase font-mono px-[7px] py-[2px] rounded-full
                             bg-emerald-500/[0.10] text-emerald-700 border border-emerald-500/[0.3]">
                  <span class="w-[5px] h-[5px] rounded-full bg-emerald-500 shrink-0 dot-pulse"></span>
                  incremental
                </span>

                <!-- full -->
                <span x-show="view.status?.last_action === 'full'"
                      class="inline-flex items-center gap-[5px] text-[10px] tracking-[0.06em]
                             uppercase font-mono px-[7px] py-[2px] rounded-full
                             bg-amber-500/[0.12] text-amber-700 border border-amber-500/[0.3]">
                  <span class="w-[5px] h-[5px] rounded-full bg-amber-500 shrink-0 dot-pulse"></span>
                  full
                </span>

                <!-- error -->
                <span x-show="view.status?.last_error"
                      class="inline-flex items-center gap-[5px] text-[10px] tracking-[0.06em]
                             uppercase font-mono px-[7px] py-[2px] rounded-full
                             bg-red-500/[0.10] text-red-700 border border-red-500/[0.3]">
                  <span class="w-[5px] h-[5px] rounded-full bg-red-500 shrink-0"></span>
                  error
                </span>
              </div>

              <!-- Source → Target -->
              <div class="flex items-center gap-[6px] mt-[7px]">
                <span class="text-[11px] font-mono text-[#5c5c7a]" x-text="view.source_table"></span>
                <svg class="w-3 h-3 text-[#b8b8c8] shrink-0" fill="none" viewBox="0 0 24 24"
                     stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                        d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                </svg>
                <span class="text-[11px] font-mono text-[#5c5c7a]"
                      x-text="view.target_table || 'auto'"></span>
              </div>
            </div>

            <!-- Action buttons -->
            <div class="flex items-center gap-1 shrink-0">
              <button @click="triggerRefresh(view.name)"
                      :disabled="refreshing[view.name] === true"
                      class="flex items-center gap-[5px] text-[11px] font-semibold
                             px-[11px] py-[6px] rounded-lg cursor-pointer
                             bg-indigo-50 hover:bg-indigo-100
                             text-indigo-700 hover:text-indigo-800
                             border border-indigo-200 hover:border-indigo-300
                             transition-all duration-150
                             disabled:opacity-35 disabled:cursor-not-allowed
                             active:scale-95">
                <template x-if="!refreshing[view.name]">
                  <span>Refresh</span>
                </template>
                <template x-if="refreshing[view.name]">
                  <span class="flex items-center gap-[5px]">
                    <svg class="w-3 h-3 spin" viewBox="0 0 24 24" fill="none">
                      <circle cx="12" cy="12" r="9"
                              stroke="currentColor" stroke-width="2.5"
                              stroke-dasharray="56.55" stroke-dashoffset="42"
                              stroke-linecap="round"/>
                    </svg>
                    Running
                  </span>
                </template>
              </button>

              <button @click="editView(view)"
                      class="text-[11px] font-medium px-[10px] py-[6px] rounded-lg
                             bg-[rgba(15,15,30,0.03)] hover:bg-[rgba(15,15,30,0.06)]
                             text-[#666684] hover:text-[#1a1a28]
                             border border-[rgba(15,15,30,0.10)] hover:border-[rgba(15,15,30,0.18)]
                             transition-all duration-150 active:scale-95">
                Edit
              </button>

              <button @click="deleteView(view.name)"
                      class="text-[11px] font-medium px-[10px] py-[6px] rounded-lg
                             bg-[rgba(15,15,30,0.03)] hover:bg-red-500/10
                             text-[#666684] hover:text-red-600
                             border border-[rgba(15,15,30,0.10)] hover:border-red-500/35
                             transition-all duration-150 active:scale-95">
                Delete
              </button>
            </div>
          </div>

          <!-- Stats row -->
          <div x-show="view.status"
               class="flex flex-wrap gap-x-[18px] gap-y-[6px] mt-4 pt-[14px]
                      border-t border-[rgba(15,15,30,0.06)]">

            <div class="flex items-baseline gap-[6px]">
              <span class="text-[9.5px] font-mono text-[#9090a8] uppercase tracking-[0.08em]">Refreshes</span>
              <span class="text-[12px] font-mono tabular-nums text-[#3a3a52]"
                    x-text="view.status?.total_refreshes ?? 0"></span>
            </div>

            <div class="flex items-baseline gap-[6px]">
              <span class="text-[9.5px] font-mono text-[#9090a8] uppercase tracking-[0.08em]">Duration</span>
              <span class="text-[12px] font-mono tabular-nums text-[#3a3a52]"
                    x-text="view.status?.last_duration != null ? view.status.last_duration.toFixed(2) + 's' : '—'"></span>
            </div>

            <!-- Chunked backfill progress: visible only while a chunked refresh is
                 in flight (chunks_total != null). Completed backfill clears
                 chunks_total so the chip goes away. -->
            <div x-show="view.status?.chunks_total != null"
                 class="flex items-baseline gap-[6px]">
              <span class="text-[9.5px] font-mono uppercase tracking-[0.08em] text-indigo-600/85">Chunks</span>
              <span class="text-[12px] font-mono tabular-nums font-semibold text-indigo-700"
                    x-text="(view.status?.chunks_done ?? 0) + ' / ' + view.status?.chunks_total"></span>
            </div>

            <div x-show="view.status?.last_range" class="flex items-baseline gap-[6px]">
              <span class="text-[9.5px] font-mono text-[#9090a8] uppercase tracking-[0.08em]">Range</span>
              <span class="text-[10.5px] font-mono tabular-nums text-[#5c5c7a]"
                    x-text="view.status?.last_range"></span>
            </div>

            <div class="flex items-baseline gap-[6px]">
              <span class="text-[9.5px] font-mono text-[#9090a8] uppercase tracking-[0.08em]">Interval</span>
              <span class="text-[12px] font-mono tabular-nums text-[#3a3a52]"
                    x-text="view.refresh_interval_seconds + 's'"></span>
            </div>

            <div x-show="view.status?.last_refresh" class="flex items-baseline gap-[6px]">
              <span class="text-[9.5px] font-mono text-[#9090a8] uppercase tracking-[0.08em]">Last</span>
              <span class="text-[12px] font-mono tabular-nums text-[#3a3a52]"
                    x-text="view.status?.last_refresh ? timeAgo(view.status.last_refresh) : '—'"></span>
            </div>

            <div x-show="view.status?.total_errors > 0" class="flex items-baseline gap-[6px]">
              <span class="text-[9.5px] font-mono text-[#9090a8] uppercase tracking-[0.08em]">Errors</span>
              <span class="text-[12px] font-mono tabular-nums font-semibold text-red-600"
                    x-text="view.status?.total_errors"></span>
            </div>
          </div>

          <!-- Error detail -->
          <div x-show="view.status?.last_error"
               class="mt-3 text-[11px] font-mono leading-relaxed text-red-700
                      bg-red-500/[0.07] border border-red-500/[0.22] rounded-lg p-3 break-all">
            <span x-text="view.status?.last_error"></span>
          </div>

          <!-- Query (collapsible) -->
          <details class="group mt-3">
            <summary class="flex items-center gap-[5px] w-fit cursor-pointer select-none
                            text-[11px] font-mono text-[#9090a8] hover:text-[#3a3a52]
                            transition-colors duration-150">
              <svg class="w-[11px] h-[11px] transition-transform duration-150 group-open:rotate-90 shrink-0"
                   fill="none" viewBox="0 0 24 24" stroke-width="2.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
              </svg>
              query
            </summary>
            <pre class="mt-[9px] text-[11px] font-mono leading-[1.7] text-[#3a3a52]
                        bg-[#f4f4f9] border border-[rgba(15,15,30,0.06)]
                        rounded-lg px-4 py-3.5 overflow-x-auto"><code x-text="view.query"></code></pre>
          </details>

          <!-- Recent refresh queries (collapsible) — links to Trino UI -->
          <details x-show="view.status?.recent_queries?.length > 0" class="group mt-2">
            <summary class="flex items-center gap-[5px] w-fit cursor-pointer select-none
                            text-[11px] font-mono text-[#9090a8] hover:text-[#3a3a52]
                            transition-colors duration-150">
              <svg class="w-[11px] h-[11px] transition-transform duration-150 group-open:rotate-90 shrink-0"
                   fill="none" viewBox="0 0 24 24" stroke-width="2.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
              </svg>
              <span>recent queries</span>
              <span class="text-[#c0c0d0] font-normal"
                    x-text="'(' + (view.status?.recent_queries?.length ?? 0) + ')'"></span>
            </summary>

            <div class="mt-[9px] bg-[#f4f4f9] border border-[rgba(15,15,30,0.06)] rounded-lg
                        divide-y divide-[rgba(15,15,30,0.05)]">
              <template x-for="q in view.status.recent_queries" :key="q.query_id">
                <a :href="q.info_uri" target="_blank" rel="noopener"
                   class="flex items-center gap-[10px] px-3 py-[8px] hover:bg-white/60 transition-colors duration-100">
                  <!-- stage chip -->
                  <span class="shrink-0 text-[9.5px] uppercase tracking-[0.08em] font-mono font-medium
                               px-[7px] py-[2px] rounded-md"
                        :class="q.stage === 'merge'
                                  ? 'bg-indigo-500/[0.10] text-indigo-700 border border-indigo-500/[0.25]'
                                  : q.stage === 'full_insert'
                                    ? 'bg-emerald-500/[0.10] text-emerald-800 border border-emerald-500/[0.25]'
                                    : 'bg-[rgba(15,15,30,0.05)] text-[#666684] border border-[rgba(15,15,30,0.10)]'"
                        x-text="q.stage"></span>

                  <!-- query id -->
                  <span class="font-mono text-[11px] text-[#3a3a52] truncate"
                        x-text="q.query_id"></span>

                  <!-- elapsed + rows -->
                  <span class="ml-auto shrink-0 flex items-baseline gap-[10px]">
                    <span class="text-[10.5px] font-mono tabular-nums text-[#666684]"
                          x-text="(q.elapsed_ms / 1000).toFixed(2) + 's'"></span>
                    <span x-show="q.processed_rows > 0"
                          class="text-[10.5px] font-mono tabular-nums text-[#888ca0]"
                          x-text="formatRows(q.processed_rows) + ' rows'"></span>
                  </span>

                  <!-- external-link icon -->
                  <svg class="w-[11px] h-[11px] text-[#c0c0d0] shrink-0" fill="none"
                       viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
                  </svg>
                </a>
              </template>
            </div>
          </details>

        </div>
      </div>
    </template>

    <!-- Empty state -->
    <div x-show="views.length === 0"
         class="flex flex-col items-center justify-center py-[120px] select-none">
      <div class="w-14 h-14 rounded-2xl bg-white border border-[rgba(15,15,30,0.08)]
                  flex items-center justify-center mb-5">
        <svg class="w-6 h-6 text-[#c0c0d0]" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375
                   m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375
                   m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375
                   m16.5 5.625c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
        </svg>
      </div>
      <p class="text-[13px] text-[#3a3a52] font-medium">No views configured</p>
      <p class="text-[11px] text-[#9090a8] mt-2 font-mono">
        Click <span class="text-[#5c5c7a] border-b border-[#c0c0d0] pb-px cursor-pointer"
                    @click="showForm = true; editingView = null; resetForm()">New View</span>
        to get started
      </p>
    </div>
  </div>

</div>

<!-- ── Toast ───────────────────────────────────────────────────── -->
<div x-show="toast.message" x-cloak x-transition.opacity
     class="fixed bottom-6 right-6 z-[60] max-w-[420px] px-4 py-[10px] rounded-xl
            text-[12px] font-mono leading-snug shadow-[0_10px_30px_rgba(15,15,30,0.15)]
            border"
     :class="{
       'bg-white text-[#3a3a52] border-[rgba(15,15,30,0.10)]': toast.kind === 'muted',
       'bg-emerald-50 text-emerald-800 border-emerald-500/[0.35]': toast.kind === 'success',
       'bg-red-50 text-red-700 border-red-500/[0.35]': toast.kind === 'error',
     }"
     x-text="toast.message"></div>

<!-- ── Modal overlay ────────────────────────────────────────────── -->
<div x-show="showForm" x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     @keydown.escape.window="showForm = false">

  <!-- Backdrop -->
  <div class="absolute inset-0 bg-[rgba(15,15,30,0.35)] backdrop-blur-[10px]"
       @click="showForm = false"></div>

  <!-- Panel -->
  <div class="relative bg-white border border-[rgba(15,15,30,0.10)]
              rounded-2xl w-full max-w-[680px] max-h-[92vh] overflow-y-auto
              shadow-[0_0_0_1px_rgba(99,102,241,0.10),0_40px_80px_rgba(15,15,30,0.18)]
              modal-enter">

    <!-- Modal header -->
    <div class="flex items-start justify-between px-6 py-5
                border-b border-[rgba(15,15,30,0.08)]">
      <div>
        <h2 class="text-[14px] font-semibold text-[#0d0d18] tracking-[-0.01em]"
            x-text="editingView ? 'Edit View' : 'New View'"></h2>
        <p class="text-[11px] font-mono text-[#666684] mt-1"
           x-text="editingView ? 'Update configuration for ' + editingView : 'Configure a new incremental materialized view'"></p>
      </div>
      <button @click="showForm = false"
              class="w-7 h-7 rounded-lg bg-[rgba(15,15,30,0.04)] hover:bg-[rgba(15,15,30,0.08)]
                     flex items-center justify-center shrink-0 ml-4
                     text-[#666684] hover:text-[#1a1a28]
                     border border-[rgba(15,15,30,0.08)]
                     transition-all duration-150 active:scale-90">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Form body — dynamically rendered from /api/views/schema -->
    <div class="px-6 py-5 space-y-[18px]">

      <template x-for="(row, idx) in schemaRows" :key="idx">
        <div :class="row.length > 1 ? 'grid grid-cols-2 gap-3' : ''">

          <template x-for="field in row" :key="field.name">
            <div>

              <!-- Label -->
              <label class="block text-[10.5px] font-mono font-medium text-[#666684]
                            uppercase tracking-[0.08em] mb-[7px]">
                <span x-text="field.label"></span>
                <template x-if="field.help">
                  <span class="normal-case text-[#9090a8] font-normal ml-1.5 tracking-normal">
                    — <span x-text="field.help"></span>
                  </span>
                </template>
                <template x-if="!field.required && !field.help">
                  <span class="text-[#a8a8c0] font-normal normal-case tracking-normal">(optional)</span>
                </template>
              </label>

              <!-- text (multi-line) -->
              <template x-if="field.type === 'text'">
                <div>
                  <textarea
                    x-model="form[field.name]"
                    @input="field.name === 'query' && scheduleParse()"
                    :rows="field.rows || 6"
                    :placeholder="field.placeholder"
                    class="w-full bg-white border border-[rgba(15,15,30,0.12)] rounded-[10px]
                           px-3 py-[10px] text-[12px] font-mono text-[#1a1a28] placeholder-[#b8b8c8]
                           leading-[1.75] resize-y
                           focus:outline-none focus:border-indigo-500/55
                           focus:ring-2 focus:ring-indigo-500/[0.14]
                           transition-[border-color,box-shadow] duration-150"></textarea>

                  <!-- Live parse panel — only shown for the query field -->
                  <template x-if="field.name === 'query'">
                    <div class="mt-2">
                      <!-- error state -->
                      <div x-show="parseError && !parsing"
                           class="text-[11px] font-mono text-red-700 leading-relaxed
                                  bg-red-500/[0.06] border border-red-500/[0.22] rounded-lg px-3 py-[8px]">
                        <span class="font-medium uppercase tracking-[0.06em] text-[10px]">parse error</span>
                        <span class="block mt-[2px]" x-text="parseError"></span>
                      </div>

                      <!-- parsed attributes -->
                      <div x-show="parsed && !parseError"
                           class="flex flex-wrap items-center gap-[6px] text-[11px] font-mono
                                  bg-emerald-500/[0.05] border border-emerald-500/[0.22]
                                  rounded-lg px-3 py-[8px]">
                        <span class="uppercase tracking-[0.06em] text-[10px] text-emerald-800/85 font-medium mr-1">
                          derived
                        </span>
                        <template x-for="chip in [
                          { label: 'source', value: parsed && parsed.source_table },
                          { label: 'filter col', value: parsed && parsed.filter_column },
                          { label: 'granularity', value: parsed && parsed.granularity },
                          { label: 'merge keys', value: parsed && (parsed.merge_keys || []).join(', ') },
                        ]" :key="chip.label">
                          <span class="inline-flex items-baseline gap-[5px]
                                       px-[8px] py-[3px] rounded-md
                                       bg-white/70 border border-[rgba(15,15,30,0.10)]">
                            <span class="text-[9.5px] uppercase tracking-[0.08em] text-[#666684]"
                                  x-text="chip.label"></span>
                            <span class="text-[#1a1a28]" x-text="chip.value"></span>
                          </span>
                        </template>
                      </div>

                      <!-- subtle in-flight hint -->
                      <div x-show="parsing"
                           class="text-[10.5px] font-mono text-[#888ca0] mt-[4px] ml-[2px]">
                        parsing…
                      </div>
                    </div>
                  </template>
                </div>
              </template>

              <!-- number -->
              <template x-if="field.type === 'number'">
                <div class="flex items-center gap-2">
                  <input
                    x-model.number="form[field.name]"
                    type="number"
                    :min="field.min"
                    :placeholder="field.placeholder"
                    class="w-28 bg-white border border-[rgba(15,15,30,0.12)] rounded-[10px]
                           px-3 py-[10px] text-[13px] font-mono tabular-nums text-[#1a1a28]
                           focus:outline-none focus:border-indigo-500/55
                           focus:ring-2 focus:ring-indigo-500/[0.14]
                           transition-[border-color,box-shadow] duration-150">
                  <span x-show="field.suffix" x-text="field.suffix"
                        class="text-[11px] font-mono text-[#888ca0]"></span>
                </div>
              </template>

              <!-- string / array (single-line input) -->
              <template x-if="field.type === 'string' || field.type === 'array'">
                <input
                  x-model="form[field.name]"
                  type="text"
                  :placeholder="field.placeholder"
                  :disabled="field.disabled_on_edit && editingView !== null"
                  class="w-full bg-white border border-[rgba(15,15,30,0.12)] rounded-[10px]
                         px-3 py-[10px] text-[13px] font-mono text-[#1a1a28] placeholder-[#b8b8c8]
                         focus:outline-none focus:border-indigo-500/55
                         focus:ring-2 focus:ring-indigo-500/[0.14]
                         disabled:opacity-40 disabled:cursor-not-allowed
                         transition-[border-color,box-shadow] duration-150">
              </template>

              <!-- select (dropdown) -->
              <template x-if="field.type === 'select'">
                <select
                  x-model="form[field.name]"
                  :disabled="field.disabled_on_edit && editingView !== null"
                  class="w-full bg-white border border-[rgba(15,15,30,0.12)] rounded-[10px]
                         px-3 py-[10px] text-[13px] font-mono text-[#1a1a28]
                         focus:outline-none focus:border-indigo-500/55
                         focus:ring-2 focus:ring-indigo-500/[0.14]
                         disabled:opacity-40 disabled:cursor-not-allowed
                         transition-[border-color,box-shadow] duration-150">
                  <template x-for="opt in field.options" :key="opt.value">
                    <option :value="opt.value" x-text="opt.label"></option>
                  </template>
                </select>
              </template>

            </div>
          </template>

        </div>
      </template>

    </div>

    <!-- Form error -->
    <div x-show="formError"
         class="mx-6 -mt-1 mb-1 text-[11px] font-mono text-red-700 leading-relaxed
                bg-red-500/[0.08] border border-red-500/[0.22] rounded-lg px-4 py-3"
         x-text="formError"></div>

    <!-- Modal footer -->
    <div class="flex justify-end items-center gap-2.5 px-6 py-[18px]
                border-t border-[rgba(15,15,30,0.08)]">
      <button @click="showForm = false"
              class="px-4 py-[8px] text-[13px] font-medium text-[#666684] hover:text-[#1a1a28]
                     hover:bg-[rgba(15,15,30,0.04)] rounded-lg
                     transition-all duration-150">
        Cancel
      </button>
      <button @click="submitForm()"
              class="px-5 py-[8px] bg-indigo-600 hover:bg-indigo-500 text-[13px] font-semibold text-white
                     rounded-lg transition-colors duration-150 active:scale-[0.97]
                     shadow-[0_0_0_1px_rgba(99,102,241,0.4),0_4px_14px_rgba(99,102,241,0.2)]">
        <span x-text="editingView ? 'Save Changes' : 'Create View'"></span>
      </button>
    </div>

  </div>
</div>

<!-- ── Alpine.js logic ──────────────────────────────────────────── -->
<script>
function app() {
  return {
    views: [],
    showForm: false,
    editingView: null,
    formError: '',
    refreshing: {},
    schema: [],
    form: {},

    // ── live query parsing (populates as the operator types) ──
    parsed: null,          // { source_table, filter_column, granularity, merge_keys }
    parseError: '',        // human-readable error from /api/views/parse
    parsing: false,        // in-flight indicator
    _parseTimer: null,     // debounce handle

    get schemaRows() {
      // Group consecutive fields sharing the same non-null `group` into a single row.
      const rows = [];
      let current = null;
      for (const f of this.schema) {
        if (f.group && current && current[0].group === f.group) {
          current.push(f);
        } else {
          current = [f];
          rows.push(current);
        }
      }
      return rows;
    },

    async init() {
      await this.loadSchema();
      this.resetForm();
      await this.loadViews();
      setInterval(() => this.loadViews(), 5000);
    },

    async loadSchema() {
      try {
        const res = await fetch('/api/views/schema');
        this.schema = await res.json();
      } catch (e) {
        console.error('Failed to load form schema:', e);
      }
    },

    async loadViews() {
      try {
        const res = await fetch('/api/views');
        this.views = await res.json();
      } catch (e) {
        console.error('Failed to load views:', e);
      }
    },

    resetForm() {
      const fresh = {};
      for (const f of this.schema) {
        fresh[f.name] = f.default !== undefined ? f.default
                      : f.type === 'number' ? null
                      : '';
      }
      this.form = fresh;
      this.formError = '';
      this.parsed = null;
      this.parseError = '';
      this.parsing = false;
      if (this._parseTimer) { clearTimeout(this._parseTimer); this._parseTimer = null; }
    },

    // Debounce-parse the current query. Called from the textarea's @input.
    scheduleParse() {
      if (this._parseTimer) clearTimeout(this._parseTimer);
      const q = (this.form.query || '').trim();
      if (!q) {
        this.parsed = null;
        this.parseError = '';
        this.parsing = false;
        return;
      }
      this._parseTimer = setTimeout(() => this.runParse(q), 350);
    },

    async runParse(q) {
      this.parsing = true;
      try {
        const res = await fetch('/api/views/parse', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q }),
        });
        if (res.ok) {
          this.parsed = await res.json();
          this.parseError = '';
        } else {
          const body = await res.json().catch(() => ({ detail: 'parse failed' }));
          this.parsed = null;
          this.parseError = body.detail || 'parse failed';
        }
      } catch (e) {
        this.parsed = null;
        this.parseError = e.message || 'network error';
      } finally {
        this.parsing = false;
      }
    },

    editView(view) {
      this.editingView = view.name;
      const populated = {};
      for (const f of this.schema) {
        const v = view[f.name];
        if (f.type === 'array') {
          populated[f.name] = Array.isArray(v) ? v.join(', ') : (v || '');
        } else {
          populated[f.name] = v != null ? v : '';
        }
      }
      this.form = populated;
      this.formError = '';
      this.parsed = null;
      this.parseError = '';
      this.showForm = true;
      // Populate the parsed panel immediately so the user sees the
      // current derivation without waiting for the debounce.
      this.scheduleParse();
    },

    buildBody() {
      const body = {};
      for (const f of this.schema) {
        const raw = this.form[f.name];
        if (f.type === 'array') {
          body[f.name] = String(raw || '').split(',').map(s => s.trim()).filter(Boolean);
        } else if (f.type === 'number') {
          body[f.name] = raw;
        } else if (f.required) {
          body[f.name] = raw;
        } else {
          body[f.name] = raw || null;
        }
      }
      return body;
    },

    validateForm() {
      for (const f of this.schema) {
        if (!f.required) continue;
        const v = this.form[f.name];
        const empty = f.type === 'array'
          ? String(v || '').split(',').map(s => s.trim()).filter(Boolean).length === 0
          : v === '' || v == null;
        if (empty) return `${f.label} is required.`;
      }
      return null;
    },

    async submitForm() {
      this.formError = '';
      const err = this.validateForm();
      if (err) { this.formError = err; return; }
      if (this.parseError) { this.formError = this.parseError; return; }

      const body = this.buildBody();

      try {
        const url = this.editingView ? `/api/views/${this.editingView}` : '/api/views';
        const method = this.editingView ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail); }
        this.showForm = false;
        await this.loadViews();
      } catch (e) {
        this.formError = e.message;
      }
    },

    async deleteView(name) {
      if (!confirm(`Delete view "${name}"?`)) return;
      await fetch(`/api/views/${name}`, { method: 'DELETE' });
      await this.loadViews();
    },

    async triggerRefresh(name) {
      this.refreshing = { ...this.refreshing, [name]: true };
      try {
        const res = await fetch(`/api/views/${name}/refresh`, { method: 'POST' });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          this.showToast(`${name}: refresh failed — ${body.detail || res.statusText}`, 'error');
        } else if (body.last_error) {
          this.showToast(`${name}: ${body.last_error}`, 'error');
        } else {
          const action = body.last_action || 'done';
          const label = { skip: 'no changes', full: 'full refresh', incremental: 'incremental refresh' }[action] || action;
          this.showToast(`${name}: ${label}`, action === 'skip' ? 'muted' : 'success');
        }
        await this.loadViews();
      } catch (e) {
        this.showToast(`${name}: ${e.message || 'network error'}`, 'error');
      } finally {
        this.refreshing = { ...this.refreshing, [name]: false };
      }
    },

    // ── toast ──
    toast: { message: '', kind: 'muted' },
    _toastTimer: null,
    showToast(message, kind = 'muted') {
      this.toast = { message, kind };
      if (this._toastTimer) clearTimeout(this._toastTimer);
      this._toastTimer = setTimeout(() => { this.toast = { message: '', kind }; }, 3500);
    },

    timeAgo(ts) {
      const diff = Math.floor(Date.now() / 1000 - ts);
      if (diff < 60)   return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      return Math.floor(diff / 3600) + 'h ago';
    },

    formatRows(n) {
      if (n == null) return '';
      if (n < 1000) return String(n);
      if (n < 1e6)  return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
      return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
    },
  };
}
</script>

</body>
</html>
