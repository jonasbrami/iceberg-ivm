repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit, parallel)
        entry: uv run pytest -m "not integration"
        language: system
        pass_filenames: false
        stages: [pre-push]
