services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19001:9001"
    healthcheck:
      test: mc ready local
      interval: 2s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
             mc mb --ignore-existing local/warehouse"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_DB: iceberg
    volumes:
      - ./trino-config/init-iceberg-catalog.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: pg_isready -U postgres
      interval: 2s
      retries: 10

  trino:
    image: jonasbrami/trino-arrow:479-03d1b24
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./trino-config/iceberg.properties:/etc/trino/catalog/iceberg.properties
    ports:
      - "28080:8080"
    healthcheck:
      test: trino --execute "SELECT 1"
      interval: 5s
      retries: 30
      start_period: 30s

  seed:
    build:
      context: ./seed
    depends_on:
      trino:
        condition: service_healthy
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_USER: seed
    restart: "no"

  iceberg-ivm:
    image: ghcr.io/jonasbrami/iceberg-ivm:0.5.0
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      TRINO_URL: http://trino:8080
      TRINO_USER: iceberg-ivm
    volumes:
      - ./config.yaml:/data/config.yaml
      - ./views.yaml:/data/views.yaml
      - ivm-state:/data/state
    command: ["-c", "/data/config.yaml", "--views", "/data/views.yaml"]
    ports:
      - "8001:8000"

volumes:
  ivm-state:
